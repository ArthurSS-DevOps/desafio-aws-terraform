<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DreamSquad - DevOps Interview</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #ffffff;
      background: url('backimage-dofundo.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: rgba(11, 25, 86, 0.8);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo-box {
      background-color: rgba(255, 255, 255, 0.8);
      padding: 5px 10px;
      border-radius: 6px;
    }

    header img {
      height: 50px;
    }

    header a {
      color: #FF679A;
      text-decoration: none;
      font-weight: bold;
    }

    main {
      text-align: center;
      padding: 4px 20px;
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 12px;
      margin: 20px auto;
      max-width: 800px;
      flex: 1;
    }

    h1 {
      color: #FF679A;
    }

    .github-link {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background-color: #FF679A;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .github-link:hover {
      background-color: #e05585;
    }

    footer {
      background-color: rgba(11, 25, 86, 0.8);
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-box">
      <img src="dreamsquad-logo.svg" alt="DreamSquad Logo">
    </div>
    <a href="https://github.com/ArthurSS-DevOps" target="_blank">Meu GitHub</a>
  </header>

  <main>
    <h1>Bem-vindo à DreamSquad</h1>
    <p>Este projeto foi desenvolvido como parte da minha entrevista DevOps.</p>
    <a class="github-link" href="https://github.com/ArthurSS-DevOps" target="_blank">Visite meu GitHub</a>
  </main>

  <footer>
    &copy; 2026 DreamSquad - Projeto DevOps por Arthur.S
  </footer>
</body>
</html>
